name: Eval Mock Gate

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  eval-mock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install test dependencies
        run: |
          uv venv --python 3.11 .venv
          uv pip install -e ".[dev]"

      - name: Run unit tests
        run: .venv/bin/python -m pytest -q

      - name: Run mock eval harness + regression gate
        run: |
          .venv/bin/python scripts/run_eval.py \
            --mock \
            --commit-sha "${{ github.sha }}" \
            --ground-truth tests/fixtures/ground_truth \
            --output-dir eval_reports \
            --workloads chat_short long_generation \
            --budget 2 \
            --seed 7 \
            --baseline-report tests/fixtures/ci_baseline.json \
            --gate-strategy greedy_agent

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports-${{ github.sha }}
          path: eval_reports/
